    function Anim({ value }) {
      const [v, setV] = useState(0);
      const target = typeof value === 'bigint' ? Number(value / KELVIN_PER_RLO) : value;
      useEffect(() => {
        let from = v, start = null;
        const step = (ts) => {
          if (!start) start = ts;
          const p = Math.min((ts - start) / 400, 1);
          setV(Math.round(from + (target - from) * (1 - Math.pow(1 - p, 3))));
          if (p < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      }, [target]);
      return n(v);
    }

          border: "1px solid " + s.bd,
          letterSpacing: "0.02em",
          textTransform: "uppercase",
        }}>
          {children}
        </span>
      );
    }

    function Button({ children, onClick, disabled, variant = "primary", size = "md", style = {} }) {
      const sizes = { 
        sm: { h: 34, px: 16, fs: 12, radius: 8 }, 
        md: { h: 46, px: 24, fs: 14, radius: 10 }, 
        lg: { h: 54, px: 32, fs: 15, radius: 12 } 
      };
      const variants = {
        primary: { 
          bg: "linear-gradient(135deg, #d4af37 0%, #b8960c 100%)", 
          c: "#0a0a0a", 
          shadow: "0 4px 16px rgba(212,175,55,0.3)",
          border: "none"
        },
        secondary: { 
          bg: "transparent", 
          c: T.tx2, 
          shadow: "none",
          border: "1px solid " + T.b2
        },
        danger: { 
          bg: T.errorBg, 
          c: T.error, 
          shadow: "none",
          border: "1px solid " + T.errorBd
        },
        ghost: {
          bg: "rgba(212,175,55,0.08)",
          c: T.gold,
          shadow: "none",
          border: "1px solid " + T.goldBd
        }
      };
      const sz = sizes[size], vr = variants[variant];
      return (
        <button onClick={onClick} disabled={disabled} style={{
          height: sz.h, 
          padding: `0 ${sz.px}px`, 
          borderRadius: sz.radius,
          border: vr.border,
          background: disabled ? T.raised : vr.bg,
          color: disabled ? T.tx4 : vr.c,
          fontSize: sz.fs, 
          fontWeight: 600, 
          cursor: disabled ? "not-allowed" : "pointer",
          fontFamily: ff, 
          opacity: disabled ? 0.5 : 1, 
          transition: "all 0.2s ease",
          boxShadow: disabled ? "none" : vr.shadow,
          letterSpacing: "0.01em",
          ...style
        }}>
          {children}
        </button>
      );
    }

    function Empty({ icon, title, desc, action }) {
      return (
        <div style={{ textAlign: "center", padding: "60px 24px" }}>
          <div style={{ fontSize: 56, marginBottom: 20, opacity: 0.4, filter: "grayscale(0.3)" }}>{icon}</div>
          <div style={{ fontSize: 18, fontWeight: 600, color: T.tx3, marginBottom: 10, letterSpacing: "-0.01em" }}>{title}</div>
          {desc && <div style={{ fontSize: 14, color: T.tx4, marginBottom: 24, lineHeight: 1.6 }}>{desc}</div>}
          {action}
        </div>
      );
    }

    function Stat({ label, value, sub, color }) {
      return (
        <div>
          <div style={{ fontSize: 11, color: T.tx4, marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.05em" }}>{label}</div>
          <div style={{ fontFamily: fm, fontSize: 28, fontWeight: 700, color: color || T.tx, letterSpacing: "-0.02em" }}>{value}</div>
          {sub && <div style={{ fontSize: 12, color: T.tx4, marginTop: 4 }}>{sub}</div>}
        </div>
      );
    }

    // PAGE: HOME (投保)
    // ══════════════════════════════════════════════════════════════════════════
    function HomePage() {
      const { wallet, balance, purchasePolicy, setPage, loading, getTodayPolicyCount, canPurchaseMore } = useApp();
      const { $, lang } = useLang();
      const [fi, setFi] = useState(0);
      const [ti, setTi] = useState(1);
      const [tab, setTab] = useState("all");
      const [date, setDate] = useState(() => { 
        const d = new Date(); d.setDate(d.getDate() + 3); 
        return d.toISOString().split("T")[0]; 
      });
      const [busy, setBusy] = useState(false);
      const [error, setError] = useState(null);

      const list = tab === "all" ? FLIGHTS : tab === "dom" ? FLIGHTS.filter(f => !f.intl) : FLIGHTS.filter(f => f.intl);
      const fl = FLIGHTS[fi];
      const tier = TIERS[ti];
      const premium = tier.premium;
      const payout = tier.payout;

      const today = new Date().toISOString().split("T")[0];
      const tomorrow = (() => { const d = new Date(); d.setDate(d.getDate() + 1); return d.toISOString().split("T")[0]; })();
      const canPurchase = date > today;
      const balanceRLO = Number(balance / KELVIN_PER_RLO);
      
      // 每日限额检查
      const todayCount = getTodayPolicyCount();
      const canBuyMore = canPurchaseMore();

      const handlePurchase = async () => {
        if (!wallet || !canPurchase || busy) return;
        if (!canBuyMore) {
          setError($("daily_limit_reached", { max: MAX_POLICIES_PER_DAY }));
          return;
        }
        if (balanceRLO < premium) {
          setError($("insufficient_balance"));
          return;
        }
        setError(null);
        setBusy(true);
        try {
          await purchasePolicy(fl, date, payout, premium);
          setPage("policies");
        } catch (e) {
          // 处理每日限额错误
          if (e.message.startsWith("DAILY_LIMIT:")) {
            setError($("daily_limit_reached", { max: MAX_POLICIES_PER_DAY }));
          } else {
            setError(e.message);
          }
        }
        setBusy(false);
      };

      // 日期格式化
      const formatDate = (dateStr) => {
        const d = new Date(dateStr);
        if (lang === 'zh') {
          const dp = dateStr.split("-");
          const wk = ["日","一","二","三","四","五","六"][d.getDay()];
          return `${dp[0]}年${+dp[1]}月${+dp[2]}日 周${wk}`;
        } else if (lang === 'ja') {
          const dp = dateStr.split("-");
          const wk = ["日","月","火","水","木","金","土"][d.getDay()];
          return `${dp[0]}年${+dp[1]}月${+dp[2]}日 (${wk})`;
        } else if (lang === 'ko') {
          const dp = dateStr.split("-");
          const wk = ["일","월","화","수","목","금","토"][d.getDay()];
          return `${dp[0]}년 ${+dp[1]}월 ${+dp[2]}일 (${wk})`;
        } else {
          return d.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
        }
      };

      return (
        <div style={{ maxWidth: 1080, margin: "0 auto", padding: "40px 32px" }}>
          {/* 产品线选择 */}
          <div style={{ display: "flex", gap: 12, marginBottom: 36 }}>
            {PRODUCTS.map(p => (
              <div key={p.id} style={{
                padding: "14px 24px", 
                borderRadius: 14,
                background: p.active 
                  ? "linear-gradient(135deg, rgba(212,175,55,0.12) 0%, rgba(180,140,50,0.06) 100%)"

                cursor: p.active ? "pointer" : "not-allowed",

                boxShadow: p.active ? "0 4px 20px rgba(212,175,55,0.1)" : "none"
              }}>
                <span style={{ fontSize: 22, filter: p.active ? "none" : "grayscale(1)" }}>{p.icon}</span>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 600, color: p.active ? T.gold : T.tx4, letterSpacing: "-0.01em" }}>{$(p.labelKey)}</div>
                  <div style={{ fontSize: 10, color: T.tx4, marginTop: 2, letterSpacing: "0.02em" }}>ChainSure {p.name}</div>
                </div>
                {!p.active && <Badge variant="default">{$("coming_soon")}</Badge>}
              </div>
            ))}
          </div>

          {/* Header */}
          <div style={{ marginBottom: 40 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>

              <Card>
                <span style={{ fontSize: 13, fontWeight: 600, color: T.tx2, display: "block", marginBottom: 16 }}>{$("order_confirm")}</span>
                
                {/* 核心信息：保费 vs 赔付 */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
                  <div style={{ padding: "16px", background: T.bg, borderRadius: 10, textAlign: "center" }}>
                    <div style={{ fontSize: 11, color: T.tx4, marginBottom: 6 }}>{$("you_pay")}</div>
                    <div style={{ fontFamily: fm, fontSize: 28, fontWeight: 700, color: T.tx }}>{n(premium)}</div>
                    <div style={{ fontSize: 11, color: T.tx4 }}>RLO</div>
                  </div>
                  <div style={{ padding: "16px", background: T.goldBg, border: "1px solid " + T.goldBd, borderRadius: 10, textAlign: "center" }}>
                    <div style={{ fontSize: 11, color: T.gold, marginBottom: 6 }}>{$("you_get")}</div>
                    <div style={{ fontFamily: fm, fontSize: 28, fontWeight: 700, color: T.gold }}>+{n(payout)}</div>
                    <div style={{ fontSize: 11, color: T.gold }}>RLO</div>
                  </div>
                </div>

                {/* 详细信息 */}
                <div style={{ fontSize: 12, color: T.tx4, marginBottom: 12 }}>{$("policy_details")}</div>
                {[
                  [$("flight_label"), fl.iata],
                  [$("route_label"), `${fl.dep.iata} → ${fl.arr.iata}`],
                  [$("date_label"), `${date} ${fl.dep.scheduled}`],
                  [$("condition_label"), $("delay_condition", { threshold: DELAY_THRESHOLD })],
                ].map(([k, v]) => (
                  <div key={k} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 8 }}>
                    <span style={{ color: T.tx4 }}>{k}</span>
                    <span style={{ fontFamily: fm, color: T.tx2 }}>{v}</span>
                  </div>
                ))}

                {/* 回报率提示 */}
                <div style={{ marginTop: 12, padding: "10px 14px", background: T.goldBg, border: "1px solid " + T.goldBd, borderRadius: 8, fontSize: 12 }}>
                  <span style={{ color: T.tx3 }}>💰 {$("return_rate", { premium: n(premium), payout: n(payout), multiplier: Math.round(payout / premium) })}</span>
                </div>
              </Card>

              {/* Action */}
              {error && (
                <div style={{ padding: "12px 16px", borderRadius: 10, background: T.errorBg, border: "1px solid " + T.errorBd, color: T.error, fontSize: 13 }}>
                  {error}
                </div>
              )}

              {!wallet ? (
                <Card style={{ background: T.goldBg, border: "1px solid " + T.goldBd, textAlign: "center" }}>
                  <span style={{ color: T.tx3, fontSize: 14 }}>{$("connect_first")}</span>
                </Card>
              ) : !canPurchase ? (
                <Card style={{ background: T.errorBg, border: "1px solid " + T.errorBd, textAlign: "center" }}>
                  <span style={{ color: T.error, fontSize: 14 }}>{$("future_date_only")}</span>
                </Card>
              ) : !canBuyMore ? (
                <Card style={{ background: T.errorBg, border: "1px solid " + T.errorBd, textAlign: "center" }}>
                  <span style={{ color: T.error, fontSize: 14 }}>{$("daily_limit_reached", { max: MAX_POLICIES_PER_DAY })}</span>
                </Card>
              ) : (
                <>
                  <Button onClick={handlePurchase} disabled={busy || balanceRLO < premium} size="lg" style={{ width: "100%" }}>
                    {busy ? $("processing") : $("confirm_pay", { amount: n(premium) })}
                  </Button>
                  {/* 每日限额提示 */}
                  {wallet && (
                    <div style={{ 
                      fontSize: 12, color: todayCount >= MAX_POLICIES_PER_DAY - 1 ? T.warn : T.tx4, 
                      textAlign: "center", marginTop: 8 
                    }}>
                      {$("daily_limit_hint", { count: todayCount, max: MAX_POLICIES_PER_DAY })}
                    </div>
                  )}
                </>
              )}

              {/* Contract Info */}
              <div style={{ fontSize: 11, color: T.tx4, textAlign: "center", padding: "8px 0" }}>
                ChainSure Flight · <span style={{ fontFamily: fm }}>{shortAddr(PROGRAM_ID)}</span> · Rialo Devnet
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════════════
    // PAGE: POLICIES (保单列表)
    // ══════════════════════════════════════════════════════════════════════════
    function PoliciesPage() {
      const { wallet, policies, settlePolicy, setPage } = useApp();
      const { $ } = useLang();
      const [settling, setSettling] = useState(null);

      const today = new Date().toISOString().split("T")[0];

      const handleSettle = async (policy) => {
        setSettling(policy.address);
        try {
          await settlePolicy(policy);
        } catch (e) {
          console.error(e);
        }
        setSettling(null);
      };

      if (!wallet) {
        return (
          <div style={{ maxWidth: 800, margin: "0 auto", padding: "32px 24px" }}>
            <Card>
              <Empty icon="🔒" title={$("connect_first")} />
            </Card>
          </div>
        );
      }

      const active = policies.filter(p => p.status === PolicyStatus.Active);
      const history = policies.filter(p => p.status !== PolicyStatus.Active);

      return (
        <div style={{ maxWidth: 800, margin: "0 auto", padding: "32px 24px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
            <h1 style={{ fontSize: 26, fontWeight: 700 }}>{$("my_policies")}</h1>
            <Badge>{$("policies_count", { count: policies.length })}</Badge>
          </div>

          {policies.length === 0 ? (
            <Card>
              <Empty 
                icon="📋" 
                title={$("no_policies")}
                desc={$("no_policies_desc")}
                action={<Button onClick={() => setPage("home")}>{$("go_insure")}</Button>}
              />
            </Card>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              {/* Active Policies */}
              {active.length > 0 && (
                <>
                  <div style={{ fontSize: 12, fontWeight: 600, color: T.tx4, textTransform: "uppercase" }}>
                    {$("active_policies")} ({active.length})
                  </div>
                  {active.map(p => {
                    const canSettle = p.date <= today;
                    const isSettling = settling === p.address;
                    const payoutRLO = Number(p.payoutAmount / KELVIN_PER_RLO);
                    return (
                      <Card key={p.address}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                          <div>
                            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                              <span style={{ fontFamily: fm, fontSize: 20, fontWeight: 700 }}>{p.flightIata}</span>
                              <Badge variant="success">{$("policy_active")}</Badge>
                            </div>
                            <div style={{ fontSize: 13, color: T.tx3, marginTop: 6 }}>
                              {p.depAirport} → {p.arrAirport}
                            </div>
                            <div style={{ fontSize: 12, color: T.tx4, marginTop: 2 }}>
                              {p.date} {p.scheduledDeparture}
                            </div>
                          </div>
                          <div style={{ textAlign: "right" }}>
                            <div style={{ fontSize: 11, color: T.tx4 }}>{$("you_get")}</div>
                            <div style={{ fontFamily: fm, fontSize: 20, fontWeight: 700 }}>
                              {n(payoutRLO)} <span style={{ fontSize: 11, color: T.tx4 }}>RLO</span>
                            </div>
                          </div>
                        </div>
                        <div style={{ marginTop: 16, paddingTop: 16, borderTop: "1px solid " + T.b, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                          <div style={{ fontSize: 12, color: T.tx4 }}>
                            {canSettle ? "✅ " + $("can_settle") : "⏰ " + $("waiting_flight", { date: p.date })}
                          </div>
                          {canSettle ? (
                            <Button onClick={() => handleSettle(p)} disabled={isSettling} size="sm">
                              {isSettling ? $("settling") : $("settle_now")}
                            </Button>
                          ) : (
                            <Badge>{$("waiting")}</Badge>
                          )}
                        </div>
                        <div style={{ marginTop: 12, fontSize: 11, color: T.tx4, fontFamily: fm }}>
                          PDA: {shortAddr(p.address)} · TX: {shortSig(p.txSignature)}
                        </div>
                      </Card>
                    );
                  })}
                </>
              )}

              {/* History */}
              {history.length > 0 && (
                <>
                  <div style={{ fontSize: 12, fontWeight: 600, color: T.tx4, textTransform: "uppercase", marginTop: 16 }}>
                    {$("history_policies")} ({history.length})
                  </div>
                  {history.map(p => {
                    const payoutRLO = Number(p.payoutAmount / KELVIN_PER_RLO);
                    const isClaimed = p.status === PolicyStatus.Claimed;
                    return (
                      <Card key={p.address} style={{ opacity: 0.7 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                            <span style={{ fontFamily: fm, fontSize: 16, fontWeight: 600 }}>{p.flightIata}</span>
                            <span style={{ fontSize: 12, color: T.tx4 }}>{p.date}</span>
                            <Badge variant={isClaimed ? "success" : "error"}>
                              {isClaimed ? `${$("claimed")} +${n(payoutRLO)}` : `${$("expired")} (${$("delay_min", { min: p.actualDelayMinutes })})`}
                            </Badge>
                          </div>
                          <div style={{ fontSize: 12, color: T.tx4 }}>{p.depAirport} → {p.arrAirport}</div>
                        </div>
                      </Card>
                    );
                  })}
                </>
              )}
            </div>
          )}
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════════════
    // PAGE: CLAIMS (理赔记录)
    // ══════════════════════════════════════════════════════════════════════════
    function ClaimsPage() {
      const { wallet, claims, setPage } = useApp();
      const { $ } = useLang();

      if (!wallet) {
        return (
          <div style={{ maxWidth: 800, margin: "0 auto", padding: "32px 24px" }}>
            <Card>
              <Empty icon="🔒" title={$("connect_first")} />
            </Card>
          </div>
        );
      }

      const totalClaimed = claims.reduce((sum, c) => sum + Number(c.amount / KELVIN_PER_RLO), 0);

      return (
        <div style={{ maxWidth: 800, margin: "0 auto", padding: "32px 24px" }}>
          <h1 style={{ fontSize: 26, fontWeight: 700, marginBottom: 24 }}>{$("claims_title")}</h1>

          {claims.length === 0 ? (
            <Card>
              <Empty 
                icon="💰" 
                title={$("no_claims")}
                desc={$("no_claims_desc", { threshold: DELAY_THRESHOLD })}
                action={<Button onClick={() => setPage("home")}>{$("go_insure")}</Button>}
              />
            </Card>
          ) : (
            <>
              {/* Total */}
              <Card style={{ marginBottom: 24, background: T.goldBg, border: "1px solid " + T.goldBd }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <Stat label={$("total_claimed")} value={`+${n(totalClaimed)}`} sub="RLO" color={T.gold} />
                  <div style={{ fontSize: 48, opacity: 0.3 }}>💰</div>
                </div>
              </Card>

              {/* List */}
              <div style={{ fontSize: 12, fontWeight: 600, color: T.tx4, textTransform: "uppercase", marginBottom: 12 }}>
                {$("claim_details")} ({claims.length})
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {claims.map(c => {
                  const amountRLO = Number(c.amount / KELVIN_PER_RLO);
                  return (
                    <Card key={c.address}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                        <div>
                          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                            <span style={{ fontFamily: fm, fontSize: 16, fontWeight: 700 }}>
                              {c.policy.split("_")[2]}
                            </span>
                            <Badge variant="warning">{$("delay_min", { min: c.delayMinutes })}</Badge>
                          </div>
                          <div style={{ fontSize: 12, color: T.tx4, marginTop: 6 }}>
                            {new Date(c.timestamp).toLocaleString()}
                          </div>
                        </div>
                        <div style={{ textAlign: "right" }}>
                          <div style={{ fontFamily: fm, fontSize: 22, fontWeight: 700, color: T.gold }}>+{n(amountRLO)}</div>
                          <div style={{ fontSize: 11, color: T.tx4 }}>RLO</div>
                        </div>
                      </div>
                      <div style={{ marginTop: 12, fontSize: 11, color: T.tx4, fontFamily: fm }}>
                        TX: {shortSig(c.transferSignature)}
                      </div>
                    </Card>
                  );
                })}
              </div>
            </>
          )}
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════════════
    // PAGE: WALLET (钱包)
    // ══════════════════════════════════════════════════════════════════════════
    function WalletPage() {
      const { wallet, balance, txHistory, connect, disconnect, loading } = useApp();
      const { $ } = useLang();

      if (!wallet) {
        return (
          <div style={{ maxWidth: 500, margin: "0 auto", padding: "32px 24px" }}>
            <Card style={{ textAlign: "center", padding: "48px 32px" }}>
              <div style={{ fontSize: 64, marginBottom: 24 }}>👛</div>
              <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 12 }}>{$("connect_wallet")}</h2>
              <p style={{ fontSize: 14, color: T.tx3, marginBottom: 24 }}>Rialo Wallet → ChainSure</p>
              <Button onClick={connect} disabled={loading} size="lg">
                {loading ? $("connecting") : $("connect_wallet")}
              </Button>
            </Card>
          </div>
        );
      }

      const balanceRLO = Number(balance / KELVIN_PER_RLO);

      return (
        <div style={{ maxWidth: 600, margin: "0 auto", padding: "32px 24px" }}>
          <h1 style={{ fontSize: 26, fontWeight: 700, marginBottom: 24 }}>{$("wallet_title")}</h1>

          {/* Balance Card */}
          <Card style={{ marginBottom: 24 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <Stat label={$("balance")} value={<Anim value={balance} />} sub="RLO" />
              <Badge variant="success">{$("connected")}</Badge>
            </div>
            <div style={{ marginTop: 20, paddingTop: 16, borderTop: "1px solid " + T.b }}>
              <div style={{ fontSize: 11, color: T.tx4, marginBottom: 6 }}>{$("address")}</div>
              <div style={{ fontFamily: fm, fontSize: 13, color: T.tx2, wordBreak: "break-all" }}>{wallet}</div>
            </div>
            <div style={{ marginTop: 16, display: "flex", gap: 12 }}>
              <Button onClick={disconnect} variant="danger" size="sm">{$("disconnect")}</Button>
            </div>
          </Card>

          {/* Transaction History */}
          <div style={{ fontSize: 12, fontWeight: 600, color: T.tx4, textTransform: "uppercase", marginBottom: 12 }}>
            {$("tx_history")}
          </div>
          {txHistory.length === 0 ? (
            <Card>
              <Empty icon="📝" title={$("no_tx")} />
            </Card>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {txHistory.map((tx, i) => (
                <Card key={i} style={{ padding: "14px 18px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                      <span style={{ fontSize: 20 }}>
                        {tx.type === "connect" ? "🔗" : tx.type === "disconnect" ? "🔌" : tx.type === "purchase" ? "🛡️" : tx.type === "claim" ? "💰" : "📋"}
                      </span>
                      <div>
                        <div style={{ fontSize: 13, color: T.tx }}>{tx.desc}</div>
                        <div style={{ fontSize: 11, color: T.tx4, marginTop: 2 }}>
                          {new Date(tx.time).toLocaleString()}
                          {tx.signature && <span style={{ marginLeft: 8, fontFamily: fm }}>{shortSig(tx.signature)}</span>}
                        </div>
                      </div>
                    </div>
                    {tx.amount !== undefined && tx.amount !== 0 && (
                      <div style={{ fontFamily: fm, fontSize: 14, fontWeight: 600, color: tx.amount > 0 ? T.gold : T.error }}>
                        {tx.amount > 0 ? "+" : ""}{n(tx.amount)} RLO
                      </div>
                    )}
                  </div>
                </Card>
              ))}
            </div>
          )}

          {/* Network Info */}
          <div style={{ marginTop: 24, padding: "16px", background: T.raised, borderRadius: 10, fontSize: 12, color: T.tx4 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
              <span>{$("protocol")}</span>
              <span style={{ color: T.tx2 }}>ChainSure Protocol</span>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
              <span>{$("network")}</span>
              <span style={{ color: T.tx2 }}>Rialo Devnet</span>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <span>{$("contract")}</span>
              <span style={{ fontFamily: fm, color: T.tx2 }}>{shortAddr(PROGRAM_ID)}</span>
            </div>
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════════════
    // APP
    // ══════════════════════════════════════════════════════════════════════════
    function App() {
      const { page } = useApp();
      const { lang } = useLang();
      
      return (
        <div style={{ minHeight: "100vh", background: T.bg, color: T.tx, fontFamily: ff }}>
          <NavBar />
          {page === "home" && <HomePage />}
          {page === "policies" && <PoliciesPage />}
          {page === "claims" && <ClaimsPage />}
          {page === "wallet" && <WalletPage />}
        </div>
      );
    }

    function LangProvider({ children }) {
      const [lang, setLang] = useState(() => {
        // 尝试从浏览器获取语言
        const browserLang = navigator.language.split('-')[0];
        return ['zh', 'en', 'ja', 'ko'].includes(browserLang) ? browserLang : 'zh';
      });
      
      const $ = (key, params) => t(lang, key, params);
      
      return (
        <LangContext.Provider value={{ lang, setLang, $ }}>
          {children}
        </LangContext.Provider>
      );
    }

    function Root() {
      return (
        <LangProvider>
          <AppProvider>
            <App />
          </AppProvider>
        </LangProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
  </script>
</body>
</html>
