    // ══════════════════════════════════════════════════════════════════════════
    // GLOBAL STATE (链上数据缓存 + SDK 交互)
    // ══════════════════════════════════════════════════════════════════════════
    const AppContext = createContext();

    function AppProvider({ children }) {
      const [wallet, setWallet] = useState(null);
      const [balance, setBalance] = useState(0n);
      const [policies, setPolicies] = useState([]);
      const [claims, setClaims] = useState([]);
      const [txHistory, setTxHistory] = useState([]);
      const [page, setPage] = useState("home");
      const [loading, setLoading] = useState(false);

      // 初始化 SDK
      useEffect(() => {
        rialoSDK.initialize();
        return () => rialoSDK.destroy();
      }, []);

      // 刷新链上数据
      const refreshData = useCallback(async () => {
        if (!wallet) return;
        setLoading(true);
        try {
          const bal = await rialoSDK.getBalance(wallet);
          setBalance(bal);
          
          // 真实环境: 从链上查询保单
          // const onChainPolicies = await rialoSDK.getPoliciesByOwner(wallet);
          // setPolicies(onChainPolicies);
        } catch (e) {
          console.error("[App] Refresh failed:", e);
        }
        setLoading(false);
      }, [wallet]);

      // 连接钱包
      const connect = async () => {
        setLoading(true);
        try {
          const { accountAddress } = await rialoSDK.connect("Rialo");
          setWallet(accountAddress);
          
          const bal = await rialoSDK.getBalance(accountAddress);
          setBalance(bal);
          
          addTx({ 
            type: "connect", 
            time: Date.now(), 
            desc: "钱包已连接", 
            address: shortAddr(accountAddress) 
          });
        } catch (e) {
          console.error("[App] Connect failed:", e);
        }
        setLoading(false);
      };

      // 断开连接
      const disconnect = async () => {
        await rialoSDK.disconnect();
        setWallet(null);
        setBalance(0n);
        setPolicies([]);
        setClaims([]);
        addTx({ type: "disconnect", time: Date.now(), desc: "钱包已断开" });
      };

      // 获取今日购买的保单数量
      const getTodayPolicyCount = () => {
        const today = new Date().toISOString().split("T")[0];
        const todayStart = new Date(today).getTime();
        const todayEnd = todayStart + 24 * 60 * 60 * 1000;
        return policies.filter(p => p.createdAt >= todayStart && p.createdAt < todayEnd).length;
      };

      // 检查是否可以购买
      const canPurchaseMore = () => {
        return getTodayPolicyCount() < MAX_POLICIES_PER_DAY;
      };

      // 购买保险
      const purchasePolicy = async (flight, date, payoutAmount, premiumAmount) => {
        if (!wallet) throw new Error("Wallet not connected");
        
        // 检查每日限额
        if (!canPurchaseMore()) {
          throw new Error(`DAILY_LIMIT:${MAX_POLICIES_PER_DAY}`);
        }

        const result = await rialoSDK.purchasePolicy({
          owner: wallet,
          flightIata: flight.iata,
          flightIcao: flight.icao,
          date,
          scheduledDeparture: flight.dep.scheduled,
          depAirport: flight.dep.iata,
          arrAirport: flight.arr.iata,
          payoutAmount,
          premiumAmount,
        });

        // 创建本地保单记录
        const policy = {
          address: result.policyAddress,
          owner: wallet,
          flightIata: flight.iata,
          flightIcao: flight.icao,
          flight: flight,
          date: date,
          scheduledDeparture: flight.dep.scheduled,
          depAirport: flight.dep.iata,
          arrAirport: flight.arr.iata,
          payoutAmount: result.payout,
          premiumPaid: result.premium,
          status: PolicyStatus.Active,
          createdAt: Date.now(),
          settledAt: null,
          actualDelayMinutes: null,
          txSignature: result.signature,
        };

        setPolicies(prev => [policy, ...prev]);
        setBalance(prev => prev - result.premium);
        
        addTx({
          type: "purchase",
          time: Date.now(),
          amount: -Number(result.premium / KELVIN_PER_ETH),
          flightIata: flight.iata,
          signature: result.signature,
        });

        return { signature: result.signature, policy };
      };

      // 结算保单 - 带演示流程
      const settlePolicy = async (policy, onStep, $t) => {
        if (!wallet) throw new Error("Wallet not connected");

        // 步骤1: 发起结算请求
        if (onStep) onStep(1, $t ? $t("settle_step1") : "Initiating...");
        await sleep(800);

        // 步骤2: 查询航班数据
        if (onStep) onStep(2, $t ? $t("settle_step2", { flight: policy.flightIata }) : `Querying ${policy.flightIata}...`);
        await sleep(1200);

        const delayed = policy.flight.dep_delayed;
        
        // 步骤3: 验证延误时间
        if (onStep) onStep(3, $t ? $t("settle_step3", { min: delayed }) : `Delayed ${delayed} min, verifying...`);
        await sleep(800);

        const hit = delayed >= DELAY_THRESHOLD;

        // 步骤4: 执行链上操作
        if (onStep) onStep(4, $t ? (hit ? $t("settle_step4_hit") : $t("settle_step4_miss")) : (hit ? "Claiming..." : "Updating..."));
        
        const result = await rialoSDK.settlePolicy({
          owner: wallet,
          policyAddress: policy.address,
          flightIata: policy.flightIata,
          date: policy.date,
        });

        const amountETH = n(Number(policy.payoutAmount / KELVIN_PER_ETH));
        // 步骤5: 完成
        if (onStep) onStep(5, $t ? (hit ? $t("settle_step5_hit", { amount: amountETH }) : $t("settle_step5_miss")) : (hit ? `Success! ${amountETH} ETH` : "Settled"));

        // 更新保单状态
        setPolicies(prev => prev.map(p =>
          p.address === policy.address
            ? { ...p, status: hit ? PolicyStatus.Claimed : PolicyStatus.Expired, settledAt: Date.now(), actualDelayMinutes: delayed }
            : p
        ));

        if (hit) {
          // 创建理赔记录
          const claim = {
            address: result.claimAddress,
            policy: policy.address,
            owner: wallet,
            amount: policy.payoutAmount,
            delayMinutes: delayed,
            timestamp: Date.now(),
            transferSignature: result.signature,
          };
          setClaims(prev => [claim, ...prev]);
          setBalance(prev => prev + policy.payoutAmount);
          
          addTx({
            type: "claim",
            time: Date.now(),
            amount: Number(policy.payoutAmount / KELVIN_PER_ETH),
            flightIata: policy.flightIata,
            delayMin: delayed,
            signature: result.signature,
          });
        } else {
          addTx({
            type: "expire",
            time: Date.now(),
            amount: 0,
            flightIata: policy.flightIata,
            delayMin: delayed,
            signature: result.signature,
          });
        }

        return { signature: result.signature, hit, delayed };
      };

      const addTx = (tx) => setTxHistory(prev => [tx, ...prev]);

      // 演示模式：一键添加已过期保单
      const addDemoPolicy = () => {
        if (!wallet) return null;
        
        // 使用延误严重的航班作为演示
        const demoFlight = FLIGHTS.find(f => f.dep_delayed >= DELAY_THRESHOLD) || FLIGHTS[0];
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const demoDate = yesterday.toISOString().split("T")[0];
        
        const [policyAddress] = getPolicyAddress(wallet, demoFlight.iata, demoDate);
        
        const demoPolicy = {
          address: policyAddress,
          owner: wallet,
          flightIata: demoFlight.iata,
          flightIcao: demoFlight.icao,
          flight: demoFlight,
          date: demoDate,
          scheduledDeparture: demoFlight.dep.scheduled,
          depAirport: demoFlight.dep.iata,
          arrAirport: demoFlight.arr.iata,
          payoutAmount: BigInt(500) * KELVIN_PER_ETH,  // 500 ETH
          premiumPaid: BigInt(100) * KELVIN_PER_ETH,   // 100 ETH
          status: PolicyStatus.Active,
          createdAt: Date.now() - 86400000,  // 昨天创建
          settledAt: null,
          actualDelayMinutes: null,
          txSignature: "demo_" + Math.random().toString(36).slice(2, 10),
        };
        
        setPolicies(prev => [demoPolicy, ...prev]);
        
        addTx({
          type: "demo_purchase",
          time: Date.now() - 86400000,
          amount: -100,
          flightIata: demoFlight.iata,
          signature: demoPolicy.txSignature,
        });
        
        return demoPolicy;
      };

      // 世界杯投保 → 写入全局 policies
      const purchaseWCPolicy = async ({ match, team, betType, premium, payout, odds }) => {
        await sleep(1200);
        const sig = [...Array(64)].map(() => (Math.random()*16|0).toString(16)).join("");
        const addr = "wc_policy_" + Date.now().toString(36);
        const policy = {
          address: addr,
          owner: wallet,
          type: "worldcup",
          // worldcup fields
          wcMatch: match,
          wcTeam: team,
          wcBetType: betType,
          wcOdds: odds,
          // common fields
          payoutAmount: BigInt(payout) * KELVIN_PER_ETH,
          premiumPaid: BigInt(premium) * KELVIN_PER_ETH,
          status: PolicyStatus.Active,
          createdAt: Date.now(),
          settledAt: null,
          txSignature: sig,
        };
        setPolicies(prev => [policy, ...prev]);
        setBalance(prev => prev - BigInt(premium) * KELVIN_PER_ETH);
        addTx({ type: "wc_purchase", time: Date.now(), amount: -premium, signature: sig,
          desc: team.flag + " " + team.name + " 世界杯保单" });
        return policy;
      };

      // 世界杯结算 → 写入全局 claims
      const settleWCPolicy = async (policy, onLog) => {
        const log = (msg) => onLog && onLog(msg);
        log("⏳ 发起链上结算请求...");
        await sleep(700);
        log("🔍 查询 " + policy.wcMatch.date + " " + policy.wcTeam.flag + " " + policy.wcTeam.name + " 比赛结果...");
        await sleep(1000);
        const won = Math.random() < 0.6;
        const score = won
          ? (policy.wcBetType === "win" ? "2 - 1（主队胜）" : "1 - 1（平局）")
          : (policy.wcBetType === "win" ? "0 - 2（客队胜）" : "3 - 0（非平局）");
        log("📊 比赛结果：" + score);
        await sleep(800);
        const sig = [...Array(64)].map(() => (Math.random()*16|0).toString(16)).join("");
        if (won) {
          log("✅ 符合理赔条件，触发智能合约转账...");
          await sleep(900);
          const payoutETH = Number(policy.payoutAmount / KELVIN_PER_ETH);
          log("💰 赔付 +" + payoutETH + " ETH 已到账！");
          const claim = {
            address: "wc_claim_" + Date.now().toString(36),
            policy: policy.address,
            owner: wallet,
            type: "worldcup",
            amount: policy.payoutAmount,
            wcTeam: policy.wcTeam,
            wcMatch: policy.wcMatch,
            wcResultScore: score,
            timestamp: Date.now(),
            transferSignature: sig,
          };
          setClaims(prev => [claim, ...prev]);
          setBalance(prev => prev + policy.payoutAmount);
          addTx({ type: "wc_claim", time: Date.now(),
            amount: Number(policy.payoutAmount / KELVIN_PER_ETH), signature: sig,
            desc: policy.wcTeam.flag + " " + policy.wcTeam.name + " 世界杯理赔" });
        } else {
          log("❌ 未达理赔条件，保单结算完成");
          await sleep(600);
          log("📋 保单已标记为已过期");
          addTx({ type: "wc_expire", time: Date.now(), amount: 0, signature: sig,
            desc: policy.wcTeam.flag + " " + policy.wcTeam.name + " 世界杯保单过期" });
        }
        setPolicies(prev => prev.map(p =>
          p.address === policy.address
            ? { ...p, status: won ? PolicyStatus.Claimed : PolicyStatus.Expired,
                settledAt: Date.now(), wcResultScore: score }
            : p
        ));
        return { won, score, sig };
      };

      return (
        <AppContext.Provider value={{
          wallet, balance, policies, claims, txHistory, page, loading,
          setPage, connect, disconnect, purchasePolicy, settlePolicy, refreshData, addTx,
          getTodayPolicyCount, canPurchaseMore, addDemoPolicy,
          purchaseWCPolicy, settleWCPolicy,
        }}>
          {children}
        </AppContext.Provider>
      );
    }

    function Anim({ value }) {
      const [v, setV] = useState(0);
      const target = typeof value === 'bigint' ? Number(value / KELVIN_PER_ETH) : value;
      useEffect(() => {
        let from = v, start = null;
        const step = (ts) => {
          if (!start) start = ts;
          const p = Math.min((ts - start) / 400, 1);
          setV(Math.round(from + (target - from) * (1 - Math.pow(1 - p, 3))));
          if (p < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      }, [target]);
      return n(v);
    }

                {navItems.map(item => (
                  <button key={item.id} onClick={() => setPage(item.id)} style={{
                    padding: "10px 18px", 
                    borderRadius: 10, 
                    border: page === item.id ? "1px solid " + T.goldBd : "1px solid transparent",
                    background: page === item.id ? T.goldBg : "transparent",
                    color: page === item.id ? T.gold : T.tx3,
                    fontSize: 13, 
                    fontWeight: page === item.id ? 600 : 500,
                    cursor: "pointer", 
                    fontFamily: ff, 
                    display: "flex", 
                    alignItems: "center", 
                    gap: 8,
                    transition: "all 0.2s ease",
                    letterSpacing: "0.01em"
                  }}>
                    <span style={{ opacity: page === item.id ? 1 : 0.5 }}>{item.icon}</span>
                    {$(item.labelKey)}
                  </button>
                ))}
              </div>
            </div>

            {/* Right: Language + Wallet */}
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              {/* Language Switcher */}
              <div style={{ position: "relative" }}>
                <button onClick={() => setShowLangMenu(!showLangMenu)} style={{
                  height: 36, padding: "0 12px", borderRadius: 8,
                  border: "1px solid " + T.b,
                  background: "transparent",
                  color: T.tx2,
                  fontSize: 13, fontWeight: 500, cursor: "pointer",
                  fontFamily: ff, display: "flex", alignItems: "center", gap: 6,
                }}>
                  <span>{LANGS[lang]?.flag}</span>
                  <span style={{ fontSize: 11 }}>{lang.toUpperCase()}</span>
                </button>
                {showLangMenu && (
                  <div style={{
                    position: "absolute", top: "100%", right: 0, marginTop: 8,
                    background: T.panel, border: "1px solid " + T.b,
                    borderRadius: 12, padding: 6, minWidth: 140,
                    boxShadow: "0 8px 32px rgba(0,0,0,0.4)",
                    zIndex: 200
                  }}>
                    {Object.values(LANGS).map(l => (
                      <button key={l.code} onClick={() => { setLang(l.code); setShowLangMenu(false); }} style={{
                        width: "100%", padding: "10px 14px", borderRadius: 8,
                        border: "none",
                        background: lang === l.code ? T.goldBg : "transparent",
                        color: lang === l.code ? T.gold : T.tx2,
                        fontSize: 13, fontWeight: lang === l.code ? 600 : 400,
                        cursor: "pointer", fontFamily: ff,
                        display: "flex", alignItems: "center", gap: 10,
                        textAlign: "left"
                      }}>
                        <span>{l.flag}</span>
                        <span>{l.name}</span>
                      </button>
                    ))}
                  </div>
                )}
              </div>

              {/* Balance */}
              {wallet && (
                <div style={{ 
                  display: "flex", alignItems: "center", gap: 8, 
                  padding: "8px 16px", 
                  background: "rgba(212,175,55,0.06)", 
                  border: "1px solid " + T.goldBd,
                  borderRadius: 10 
                }}>
                  <span style={{ fontSize: 15, fontFamily: fm, fontWeight: 600, color: T.gold }}><Anim value={balance} /></span>
                  <span style={{ fontSize: 11, color: T.tx4, fontWeight: 500 }}>ETH</span>
                </div>
              )}

              {/* Wallet Button */}
              <button onClick={wallet ? () => setPage("wallet") : connect} disabled={loading} style={{
                height: 40, padding: "0 20px", borderRadius: 10,
                border: "1px solid " + (wallet ? T.successBd : T.b2),
                background: wallet ? T.successBg : "rgba(255,255,255,0.03)",
                color: wallet ? T.success : T.tx2,
                fontSize: 13, fontWeight: 600, cursor: loading ? "wait" : "pointer",
                fontFamily: ff, display: "flex", alignItems: "center", gap: 10,
                transition: "all 0.2s ease"
              }}>
                <span style={{ 
                  width: 8, height: 8, borderRadius: "50%", 
                  background: wallet ? T.success : T.tx4,
                  boxShadow: wallet ? "0 0 8px " + T.success : "none"
                }} />
                {loading ? $("connecting") : wallet ? shortAddr(wallet) : $("connect_wallet")}
              </button>
            </div>
          </div>
        </nav>
      );
    } 

    // ══════════════════════════════════════════════════════════════════════════
    // PAGE: HOME
    // ══════════════════════════════════════════════════════════════════════════
    function HomePage() {
      const { wallet, balance, purchasePolicy, setPage, loading, getTodayPolicyCount, canPurchaseMore } = useApp();
      const { $, lang } = useLang();
      const [product, setProduct] = useState("flight");
      const [fi, setFi] = useState(0);
      const [ti, setTi] = useState(1);
      const [tab, setTab] = useState("all");
      const [date, setDate] = useState(() => { 
        const d = new Date(); d.setDate(d.getDate() + 3); 
        return d.toISOString().split("T")[0]; 
      });
      const [busy, setBusy] = useState(false);
      const [error, setError] = useState(null);

      const list = tab === "all" ? FLIGHTS : tab === "dom" ? FLIGHTS.filter(f => !f.intl) : FLIGHTS.filter(f => f.intl);
      const fl = FLIGHTS[fi];
      const tier = TIERS[ti];
      const premium = tier.premium;
      const payout = tier.payout;

      const today = new Date().toISOString().split("T")[0];
      const tomorrow = (() => { const d = new Date(); d.setDate(d.getDate() + 1); return d.toISOString().split("T")[0]; })();
      const canPurchase = date > today;
      const balanceETH = Number(balance / KELVIN_PER_ETH);
      
      const todayCount = getTodayPolicyCount();
      const canBuyMore = canPurchaseMore();

      const handlePurchase = async () => {
        if (!wallet || !canPurchase || busy) return;
        if (!canBuyMore) {
          setError($("daily_limit_reached", { max: MAX_POLICIES_PER_DAY }));
          return;
        }
        if (balanceETH < premium) {
          setError($("insufficient_balance"));
          return;
        }
        setError(null);
        setBusy(true);
        try {
          await purchasePolicy(fl, date, payout, premium);
          setPage("policies");
        } catch (e) {
          // 处理每日限额错误
          if (e.message.startsWith("DAILY_LIMIT:")) {
            setError($("daily_limit_reached", { max: MAX_POLICIES_PER_DAY }));
          } else {
            setError(e.message);
          }
        }
        setBusy(false);
      };

      // 日期格式化
      const formatDate = (dateStr) => {
        const d = new Date(dateStr);
        if (lang === 'zh') {
          const dp = dateStr.split("-");
          const wk = ["日","一","二","三","四","五","六"][d.getDay()];
          return `${dp[0]}年${+dp[1]}月${+dp[2]}日 周${wk}`;
        } else if (lang === 'ja') {
          const dp = dateStr.split("-");
          const wk = ["日","月","火","水","木","金","土"][d.getDay()];
          return `${dp[0]}年${+dp[1]}月${+dp[2]}日 (${wk})`;
        } else if (lang === 'ko') {
          const dp = dateStr.split("-");
          const wk = ["일","월","화","수","목","금","토"][d.getDay()];
          return `${dp[0]}년 ${+dp[1]}월 ${+dp[2]}일 (${wk})`;
        } else {
          return d.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
        }
      };

      return (
        <div style={{ maxWidth: 1080, margin: "0 auto", padding: "40px 32px" }}>
          {/* Product Line Selector */}
          <div style={{ display: "flex", gap: 10, marginBottom: 32, overflowX: "auto", paddingBottom: 4 }}>
            {PRODUCTS.map(p => (
              <button 
                key={p.id} 
                onClick={() => (p.active || p.id === 'worldcup') && setProduct(p.id)}
                disabled={!p.active && p.id !== 'worldcup'}
                style={{
                  padding: "12px 20px", 
                  borderRadius: 12,
                  border: "1px solid " + (product === p.id ? T.goldBd : (p.active || p.id === 'worldcup') ? T.b : "transparent"),
                  background: product === p.id 
                    ? "linear-gradient(135deg, rgba(212,175,55,0.12) 0%, rgba(180,140,50,0.06) 100%)" 
                    : (p.active || p.id === 'worldcup') ? "rgba(20,20,25,0.6)" : "rgba(20,20,25,0.3)",
                  opacity: (p.active || p.id === 'worldcup') ? 1 : 0.5,
                  cursor: (p.active || p.id === 'worldcup') ? "pointer" : "not-allowed",
                  display: "flex", alignItems: "center", gap: 10,
                  transition: "all 0.25s ease",
                  boxShadow: product === p.id ? "0 4px 20px rgba(212,175,55,0.1)" : "none",
                  fontFamily: ff, whiteSpace: "nowrap"
                }}
              >
                <span style={{ fontSize: 20, filter: (p.active || p.id === 'worldcup') ? "none" : "grayscale(1)" }}>{p.icon}</span>
                <span style={{ 
                  fontSize: 13, fontWeight: product === p.id ? 600 : 500, 
                  color: product === p.id ? T.gold : (p.active || p.id === 'worldcup') ? T.tx2 : T.tx4 
                }}>
                  {$(p.nameKey)}
                </span>
                {!p.active && !p.devMode && <Badge variant="default">{p.updating ? $("updating_soon") : $("coming_soon")}</Badge>}
                {p.devMode && <Badge variant="warning">{$("dev_mode")}</Badge>}
              </button>
            ))}
          </div>

          {/* Header */}
          <div style={{ marginBottom: 32 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
              <h1 style={{ fontSize: 28, fontWeight: 700, letterSpacing: "-0.02em", color: T.tx }}>
                {product === "flight" ? $("page_title") : 
                 product === "logistics" ? $("page_title_logistics") : 
                 product === "auto" ? $("page_title_auto") :
                 product === "worldcup" ? $("worldcup_title") :
                 $("page_title")}
              </h1>
              
            </div>
            <p style={{ fontSize: 14, color: T.tx3, lineHeight: 1.6, maxWidth: 520 }}>
              {product === "flight" ? $("page_desc", { threshold: DELAY_THRESHOLD }) : 
               product === "logistics" ? $("page_desc_logistics") : 
               product === "auto" ? $("page_desc_auto") :
               product === "worldcup" ? $("worldcup_desc") :
               $("page_desc", { threshold: DELAY_THRESHOLD })}
            </p>
          </div>

          {/* World Cup Page */}
          {product === "worldcup" && <WorldCupSection />}

          {product === "flight" && <div style={{ display: "grid", gridTemplateColumns: "1fr 400px", gap: 28 }}>
            {/* Left: Selection */}
            <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
              {/* Flight List */}
              <Card>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
                  <span style={{ fontSize: 14, fontWeight: 600, color: T.tx2, letterSpacing: "-0.01em" }}>{$("select_flight")}</span>
                  <div style={{ display: "flex", gap: 4, background: "rgba(0,0,0,0.3)", borderRadius: 8, padding: 3 }}>
                    {[["all","filter_all"],["dom","filter_domestic"],["intl","filter_international"]].map(([k,lbKey]) => (
                      <button key={k} onClick={() => setTab(k)} style={{ 
                        padding: "6px 14px", borderRadius: 6, border: "none",
                        background: tab === k ? T.goldBg : "transparent",
                        color: tab === k ? T.gold : T.tx4,
                        fontSize: 12, fontWeight: tab === k ? 600 : 500, cursor: "pointer", fontFamily: ff,
                        transition: "all 0.2s ease"
                      }}>{$(lbKey)}</button>
                    ))}
                  </div>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 8, maxHeight: 340, overflowY: "auto", paddingRight: 4 }}>
                  {list.map(f => {
                    const idx = FLIGHTS.indexOf(f);
                    const sel = fi === idx;
                    const delayed = f.dep_delayed >= DELAY_THRESHOLD;
                    return (
                      <div key={f.id} onClick={() => setFi(idx)} style={{
                        padding: "16px 18px", 
                        borderRadius: 12, 
                        cursor: "pointer",
                        border: "1px solid " + (sel ? T.goldBd : "rgba(255,255,255,0.04)"),
                        background: sel 
                          ? "linear-gradient(135deg, rgba(212,175,55,0.08) 0%, rgba(20,20,25,0.9) 100%)" 
                          : "rgba(255,255,255,0.02)",
                        transition: "all 0.2s ease",
                        boxShadow: sel ? "0 2px 12px rgba(212,175,55,0.1)" : "none"
                      }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                            <span style={{ 
                              fontFamily: fm, fontSize: 15, fontWeight: 700, 
                              color: sel ? T.gold : T.tx2,
                              letterSpacing: "-0.01em"
                            }}>{f.iata}</span>
                            <span style={{ fontSize: 12, color: T.tx4 }}>{f.airline.name}</span>
                            {f.intl && <Badge variant="info">{$("intl_badge")}</Badge>}
                          </div>
                          <Badge variant={delayed ? "warning" : "success"}>
                            {delayed ? $("delay_badge", { min: f.dep_delayed }) : $("ontime_badge")}
                          </Badge>
                        </div>
                        <div style={{ fontSize: 12, color: T.tx4, marginTop: 10, display: "flex", alignItems: "center", gap: 10 }}>
                          <span style={{ fontFamily: fm, color: sel ? T.tx2 : T.tx4 }}>{f.dep.iata}</span>
                          <span style={{ color: T.gold, fontSize: 10 }}>━━✈</span>
                          <span style={{ fontFamily: fm, color: sel ? T.tx2 : T.tx4 }}>{f.arr.iata}</span>
                          <span style={{ marginLeft: "auto", fontFamily: fm }}>{f.dep.scheduled}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </Card>

              {/* Date Selection */}
              <Card>
                <span style={{ fontSize: 14, fontWeight: 600, color: T.tx2, display: "block", marginBottom: 14, letterSpacing: "-0.01em" }}>{$("select_date")}</span>
                <div style={{ display: "flex", gap: 12 }}>
                  <input type="date" value={date} onChange={e => setDate(e.target.value)} min={tomorrow} style={{
                    flex: 1, padding: "14px 16px", borderRadius: 10, border: "1px solid " + T.b2,
                    background: "rgba(0,0,0,0.3)", color: T.tx, fontSize: 14, fontFamily: fm,
                    outline: "none", transition: "all 0.2s ease"
                  }} />
                  <div style={{ display: "flex", gap: 6 }}>
                    {[["tomorrow",1],["day_after",2],["plus_7_days",7]].map(([lbKey,off]) => {
                      const d = new Date(); d.setDate(d.getDate()+off);
                      const v = d.toISOString().split("T")[0];
                      const s = date === v;
                      return (
                        <button key={lbKey} onClick={() => setDate(v)} style={{
                          padding: "10px 14px", borderRadius: 8, 
                          border: "1px solid " + (s ? T.goldBd : T.b),
                          background: s ? T.goldBg : "transparent", 
                          color: s ? T.gold : T.tx4,
                          fontSize: 12, fontWeight: s ? 600 : 500, cursor: "pointer", fontFamily: ff,
                          transition: "all 0.2s ease"
                        }}>{$(lbKey)}</button>
                      );
                    })}
                  </div>
                </div>
                <div style={{ marginTop: 10, fontSize: 13, color: canPurchase ? T.tx3 : T.error }}>
                  {formatDate(date)} · {fl.dep.scheduled}
                  {!canPurchase && <span style={{ marginLeft: 8 }}>⚠️ {$("select_future_date")}</span>}
                </div>
              </Card>

              {/* Tier Selection */}
              <Card>
                <span style={{ fontSize: 13, fontWeight: 600, color: T.tx2, display: "block", marginBottom: 12 }}>{$("select_plan")}</span>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {TIERS.map((tier, i) => {
                    const sel = ti === i;
                    return (
                      <button key={i} onClick={() => setTi(i)} style={{
                        padding: "16px 20px", borderRadius: 10, 
                        border: "1px solid " + (sel ? T.goldBd : T.b),
                        background: sel ? T.goldBg : "transparent", 
                        cursor: "pointer", textAlign: "left",
                        display: "flex", justifyContent: "space-between", alignItems: "center"
                      }}>
                        <div>
                          <div style={{ fontSize: 12, color: T.tx4, marginBottom: 4 }}>{$(tier.nameKey)}</div>
                          <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
                            <span style={{ fontSize: 11, color: T.tx4 }}>{$("premium_label")}</span>
                            <span style={{ fontFamily: fm, fontSize: 18, fontWeight: 700, color: sel ? T.w : T.tx2 }}>{n(tier.premium)}</span>
                            <span style={{ fontSize: 11, color: T.tx4 }}>ETH</span>
                          </div>
                        </div>
                        <div style={{ textAlign: "right" }}>
                          <div style={{ fontSize: 11, color: T.gold, marginBottom: 4 }}>{$("payout_label", { threshold: DELAY_THRESHOLD })}</div>
                          <div style={{ display: "flex", alignItems: "baseline", gap: 4, justifyContent: "flex-end" }}>
                            <span style={{ fontFamily: fm, fontSize: 20, fontWeight: 700, color: sel ? T.gold : T.tx3 }}>+{n(tier.payout)}</span>
                            <span style={{ fontSize: 11, color: T.tx4 }}>ETH</span>
                          </div>
                        </div>
                      </button>
                    );
                  })}
                </div>
                {/* 费率说明 */}
                <div style={{ marginTop: 12, padding: "10px 14px", background: T.bg, borderRadius: 8, fontSize: 12, color: T.tx4 }}>
                  💡 {$("rate_hint", { rate: tier.rate, premium: n(premium), payout: n(payout) })}
                </div>
              </Card>
            </div>

            {/* Right: Summary & Action */}
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              {/* Flight Card */}
              <Card style={{ background: T.raised }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <div>
                    <div style={{ fontFamily: fm, fontSize: 28, fontWeight: 700 }}>{fl.iata}</div>
                    <div style={{ fontSize: 13, color: T.tx3, marginTop: 4 }}>{fl.airline.name}</div>
                  </div>
                  <Badge variant={fl.dep_delayed >= DELAY_THRESHOLD ? "warning" : "success"}>
                    {fl.dep_delayed >= DELAY_THRESHOLD ? $("delay_badge", { min: fl.dep_delayed }) : $("ontime_badge")}
                  </Badge>
                </div>
                <div style={{ display: "flex", alignItems: "center", marginTop: 20, padding: "16px 0", borderTop: "1px solid " + T.b }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 10, color: T.tx4, textTransform: "uppercase" }}>DEP</div>
                    <div style={{ fontFamily: fm, fontSize: 20, fontWeight: 700, marginTop: 4 }}>{fl.dep.iata}</div>
                    <div style={{ fontSize: 12, color: T.tx3 }}>{fl.dep.city}</div>
                  </div>
                  <div style={{ padding: "0 16px", color: T.gold }}>✈️</div>
                  <div style={{ flex: 1, textAlign: "right" }}>
                    <div style={{ fontSize: 10, color: T.tx4, textTransform: "uppercase" }}>ARR</div>
                    <div style={{ fontFamily: fm, fontSize: 20, fontWeight: 700, marginTop: 4 }}>{fl.arr.iata}</div>
                    <div style={{ fontSize: 12, color: T.tx3 }}>{fl.arr.city}</div>
                  </div>
                </div>
              </Card>

              {/* Policy Summary */}
              <Card>
                <span style={{ fontSize: 13, fontWeight: 600, color: T.tx2, display: "block", marginBottom: 16 }}>{$("order_confirm")}</span>
                
                {/* 核心信息：保费 vs 赔付 */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
                  <div style={{ padding: "16px", background: T.bg, borderRadius: 10, textAlign: "center" }}>
                    <div style={{ fontSize: 11, color: T.tx4, marginBottom: 6 }}>{$("you_pay")}</div>
                    <div style={{ fontFamily: fm, fontSize: 28, fontWeight: 700, color: T.tx }}>{n(premium)}</div>
                    <div style={{ fontSize: 11, color: T.tx4 }}>ETH</div>
                  </div>
                  <div style={{ padding: "16px", background: T.goldBg, border: "1px solid " + T.goldBd, borderRadius: 10, textAlign: "center" }}>
                    <div style={{ fontSize: 11, color: T.gold, marginBottom: 6 }}>{$("you_get")}</div>
                    <div style={{ fontFamily: fm, fontSize: 28, fontWeight: 700, color: T.gold }}>+{n(payout)}</div>
                    <div style={{ fontSize: 11, color: T.gold }}>ETH</div>
                  </div>
                </div>

                {/* 详细信息 */}
                <div style={{ fontSize: 12, color: T.tx4, marginBottom: 12 }}>{$("policy_details")}</div>
                {[
                  [$("flight_label"), fl.iata],
                  [$("route_label"), `${fl.dep.iata} → ${fl.arr.iata}`],
                  [$("date_label"), `${date} ${fl.dep.scheduled}`],
                  [$("condition_label"), $("delay_condition", { threshold: DELAY_THRESHOLD })],
                ].map(([k, v]) => (
                  <div key={k} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 8 }}>
                    <span style={{ color: T.tx4 }}>{k}</span>
                    <span style={{ fontFamily: fm, color: T.tx2 }}>{v}</span>
                  </div>
                ))}

                {/* 回报率提示 */}
                <div style={{ marginTop: 12, padding: "10px 14px", background: T.goldBg, border: "1px solid " + T.goldBd, borderRadius: 8, fontSize: 12 }}>
                  <span style={{ color: T.tx3 }}>💰 {$("return_rate", { premium: n(premium), payout: n(payout), multiplier: Math.round(payout / premium) })}</span>
                </div>
              </Card>

              {/* Action */}
              {error && (
                <div style={{ padding: "12px 16px", borderRadius: 10, background: T.errorBg, border: "1px solid " + T.errorBd, color: T.error, fontSize: 13 }}>
                  {error}
                </div>
              )}

              {!wallet ? (
                <Card style={{ background: T.goldBg, border: "1px solid " + T.goldBd, textAlign: "center" }}>
                  <span style={{ color: T.tx3, fontSize: 14 }}>{$("connect_first")}</span>
                </Card>
              ) : !canPurchase ? (
                <Card style={{ background: T.errorBg, border: "1px solid " + T.errorBd, textAlign: "center" }}>
                  <span style={{ color: T.error, fontSize: 14 }}>{$("future_date_only")}</span>
                </Card>
              ) : !canBuyMore ? (
                <Card style={{ background: T.errorBg, border: "1px solid " + T.errorBd, textAlign: "center" }}>
                  <span style={{ color: T.error, fontSize: 14 }}>{$("daily_limit_reached", { max: MAX_POLICIES_PER_DAY })}</span>
                </Card>
              ) : (
                <>
                  <Button onClick={handlePurchase} disabled={busy || balanceETH < premium} size="lg" style={{ width: "100%" }}>
                    {busy ? $("processing") : $("confirm_pay", { amount: n(premium) })}
                  </Button>
                  {/* 每日限额提示 */}
                  {wallet && (
                    <div style={{ 
                      fontSize: 12, color: todayCount >= MAX_POLICIES_PER_DAY - 1 ? T.warn : T.tx4, 
                      textAlign: "center", marginTop: 8 
                    }}>
                      {$("daily_limit_hint", { count: todayCount, max: MAX_POLICIES_PER_DAY })}
                    </div>
                  )}
                </>
              )}

              {/* Info */}
              <div style={{ fontSize: 11, color: T.tx4, textAlign: "center", padding: "8px 0" }}>
                ChainSure
              </div>
            </div>
          </div>}

          {/* NFT Mint — 固定展示在页面底部 */}

                      <Card key={p.address} style={{ opacity: 0.75 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                            {p.type === "worldcup"
                              ? <span style={{ fontSize: 20 }}>{p.wcTeam?.flag}</span>
                              : <span style={{ fontFamily: fm, fontSize: 16, fontWeight: 600 }}>{p.flightIata}</span>}
                            <span style={{ fontSize: 12, color: T.tx4 }}>
                              {p.type === "worldcup" ? p.wcMatch?.date : p.date}
                            </span>
                            {p.type === "worldcup" && <Badge variant="warning">⚽ 世界杯</Badge>}
                            <Badge variant={isClaimed ? "success" : "error"}>
                              {isClaimed
                                ? $("claimed") + " +" + n(payoutETH)
                                : p.type === "worldcup"
                                  ? $("expired") + (p.wcResultScore ? " · " + p.wcResultScore : "")
                                  : $("expired") + " (" + $("delay_min", { min: p.actualDelayMinutes }) + ")"}
                            </Badge>
                          </div>
                          <div style={{ fontSize: 12, color: T.tx4 }}>
                            {p.type === "worldcup"
                              ? p.wcTeam?.name + " · " + (p.wcBetType === "win" ? "赢球" : "平局")
                              : p.depAirport + " → " + p.arrAirport}
                          </div>
                        </div>
                      </Card>
                    );
                  })}
                </>
              )}
            </div>
          )}
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════════════
    // PAGE: CLAIMS (理赔记录)
    // ══════════════════════════════════════════════════════════════════════════
    function ClaimsPage() {
      const { wallet, claims, setPage } = useApp();
      const { $ } = useLang();

      if (!wallet) {
        return (
          <div style={{ maxWidth: 800, margin: "0 auto", padding: "32px 24px" }}>
            <Card>
              <Empty icon="🔒" title={$("connect_first")} />
            </Card>
          </div>
        );
      }

      const totalClaimed = claims.reduce((sum, c) => sum + Number(c.amount / KELVIN_PER_ETH), 0);
      const wcClaims = claims.filter(c => c.type === 'worldcup');
      const flightClaims = claims.filter(c => c.type !== 'worldcup');

      return (
        <div style={{ maxWidth: 800, margin: "0 auto", padding: "32px 24px" }}>
          <h1 style={{ fontSize: 26, fontWeight: 700, marginBottom: 24 }}>{$("claims_title")}</h1>

          {claims.length === 0 ? (
            <Card>
              <Empty 
                icon="💰" 
                title={$("no_claims")}
                desc="航班延误超过 120 分钟 或 世界杯赢球/平局 将自动触发理赔"
                action={<Button onClick={() => setPage("home")}>{$("go_insure")}</Button>}
              />
            </Card>
          ) : (
            <>
              {/* Total */}
              <Card style={{ marginBottom: 24, background: T.goldBg, border: "1px solid " + T.goldBd }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <Stat label={$("total_claimed")} value={`+${n(totalClaimed)}`} sub="ETH" color={T.gold} />
                  <div style={{ display: "flex", gap: 16 }}>
                    <div style={{ textAlign: "center" }}>
                      <div style={{ fontSize: 11, color: T.tx4, marginBottom: 4 }}>✈️ 航班</div>
                      <div style={{ fontFamily: fm, fontSize: 18, fontWeight: 700 }}>{flightClaims.length}</div>
                    </div>
                    <div style={{ textAlign: "center" }}>
                      <div style={{ fontSize: 11, color: T.tx4, marginBottom: 4 }}>⚽ 世界杯</div>
                      <div style={{ fontFamily: fm, fontSize: 18, fontWeight: 700 }}>{wcClaims.length}</div>
                    </div>
                    <div style={{ fontSize: 40, opacity: 0.25, alignSelf: "center" }}>💰</div>
                  </div>
                </div>
              </Card>

              {/* List */}
              <div style={{ fontSize: 12, fontWeight: 600, color: T.tx4, textTransform: "uppercase", marginBottom: 12 }}>
                {$("claim_details")} ({claims.length})
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {claims.map(c => {
                  const amountETH = Number(c.amount / KELVIN_PER_ETH);
                  return (
                    <Card key={c.address}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                        <div>
                          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                            {c.type === "worldcup"
                              ? <span style={{ fontSize: 22 }}>{c.wcTeam?.flag}</span>
                              : null}
                            <span style={{ fontFamily: fm, fontSize: 16, fontWeight: 700 }}>
                              {c.type === "worldcup" ? c.wcTeam?.name : c.policy.split("_")[2]}
                            </span>
                            {c.type === "worldcup"
                              ? <Badge variant="warning">⚽ 世界杯 · {c.wcResultScore || "赢球"}</Badge>
                              : <Badge variant="warning">{$("delay_min", { min: c.delayMinutes })}</Badge>}
                          </div>
                          <div style={{ fontSize: 12, color: T.tx4, marginTop: 6 }}>
                            {new Date(c.timestamp).toLocaleString()}
                          </div>
                        </div>
                        <div style={{ textAlign: "right" }}>
                          <div style={{ fontFamily: fm, fontSize: 22, fontWeight: 700, color: T.gold }}>+{n(amountETH)}</div>
                          <div style={{ fontSize: 11, color: T.tx4 }}>ETH</div>
                        </div>
                      </div>
                      <div style={{ marginTop: 12, fontSize: 11, color: T.tx4, fontFamily: fm }}>
                        TX: {shortSig(c.transferSignature)}
                      </div>
                    </Card>
                  );
                })}
              </div>
            </>
          )}
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════════════
    // PAGE: WALLET (钱包)
    // ══════════════════════════════════════════════════════════════════════════
    function WalletPage() {
      const { wallet, balance, txHistory, connect, disconnect, loading } = useApp();
      const { $ } = useLang();

      if (!wallet) {
        return (
          <div style={{ maxWidth: 500, margin: "0 auto", padding: "32px 24px" }}>
            <Card style={{ textAlign: "center", padding: "48px 32px" }}>
              <div style={{ fontSize: 64, marginBottom: 24 }}>👛</div>
              <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 12 }}>{$("connect_wallet")}</h2>
              <p style={{ fontSize: 14, color: T.tx3, marginBottom: 24 }}>Rialo Wallet → ChainSure</p>
              <Button onClick={connect} disabled={loading} size="lg">
                {loading ? $("connecting") : $("connect_wallet")}
              </Button>
            </Card>
          </div>
        );
      }

      const balanceETH = Number(balance / KELVIN_PER_ETH);

      return (
        <div style={{ maxWidth: 600, margin: "0 auto", padding: "32px 24px" }}>
          <h1 style={{ fontSize: 26, fontWeight: 700, marginBottom: 24 }}>{$("wallet_title")}</h1>

          {/* Balance Card */}
          <Card style={{ marginBottom: 24 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <Stat label={$("balance")} value={<Anim value={balance} />} sub="ETH" />
              <Badge variant="success">{$("connected")}</Badge>
            </div>
            <div style={{ marginTop: 20, paddingTop: 16, borderTop: "1px solid " + T.b }}>
              <div style={{ fontSize: 11, color: T.tx4, marginBottom: 6 }}>{$("address")}</div>
              <div style={{ fontFamily: fm, fontSize: 13, color: T.tx2, wordBreak: "break-all" }}>{wallet}</div>
            </div>
            <div style={{ marginTop: 16, display: "flex", gap: 12 }}>
              <Button onClick={disconnect} variant="danger" size="sm">{$("disconnect")}</Button>
            </div>
          </Card>

          {/* Transaction History */}
          <div style={{ fontSize: 12, fontWeight: 600, color: T.tx4, textTransform: "uppercase", marginBottom: 12 }}>
            {$("tx_history")}
          </div>
          {txHistory.length === 0 ? (
            <Card>
              <Empty icon="📝" title={$("no_tx")} />
            </Card>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {txHistory.map((tx, i) => {
                // 根据类型生成描述
                let desc = "";
                if (tx.type === "connect") desc = $("tx_connect");
                else if (tx.type === "disconnect") desc = $("tx_disconnect");
                else if (tx.type === "purchase") desc = $("tx_purchase", { flight: tx.flightIata || "" });
                else if (tx.type === "demo_purchase") desc = $("demo_purchased", { flight: tx.flightIata || "" });
                else if (tx.type === "claim") desc = $("tx_claim", { flight: tx.flightIata || "", min: tx.delayMin || 0 });
                else if (tx.type === "expire") desc = $("tx_expire", { flight: tx.flightIata || "", min: tx.delayMin || 0 });
                else if (tx.type === "wc_purchase" || tx.type === "wc_claim" || tx.type === "wc_expire") desc = tx.desc || tx.type;
                else desc = tx.desc || tx.type;
                
                return (
                  <Card key={i} style={{ padding: "14px 18px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                        <span style={{ fontSize: 20 }}>
                          {tx.type === "connect" ? "🔗" : tx.type === "disconnect" ? "🔌" : (tx.type === "purchase" || tx.type === "demo_purchase" || tx.type === "wc_purchase") ? "🛡️" : (tx.type === "claim" || tx.type === "wc_claim") ? "💰" : "📋"}
                        </span>
                        <div>
                          <div style={{ fontSize: 13, color: T.tx }}>{desc}</div>
                          <div style={{ fontSize: 11, color: T.tx4, marginTop: 2 }}>
                            {new Date(tx.time).toLocaleString()}
                            {tx.signature && <span style={{ marginLeft: 8, fontFamily: fm }}>{shortSig(tx.signature)}</span>}
                          </div>
                        </div>
                      </div>
                      {tx.amount !== undefined && tx.amount !== 0 && (
                        <div style={{ fontFamily: fm, fontSize: 14, fontWeight: 600, color: tx.amount > 0 ? T.gold : T.error }}>
                          {tx.amount > 0 ? "+" : ""}{n(tx.amount)} ETH
                        </div>
                      )}
                    </div>
                  </Card>
                );
              })}
            </div>
          )}

          {/* Info */}
          <div style={{ marginTop: 24, padding: "16px", background: T.raised, borderRadius: 10, fontSize: 12, color: T.tx4, textAlign: "center" }}>
            ChainSure
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════════════
    // APP
    // ══════════════════════════════════════════════════════════════════════════
    function App() {
      const { page } = useApp();
      const { lang } = useLang();
      
      return (
        <div style={{ minHeight: "100vh", background: T.bg, color: T.tx, fontFamily: ff }}>
          <NavBar />
          {page === "home" && <HomePage />}
          {page === "policies" && <PoliciesPage />}
          {page === "claims" && <ClaimsPage />}
          {page === "wallet" && <WalletPage />}
        </div>
      );
    }

    function LangProvider({ children }) {
      const [lang, setLang] = useState(() => {
        const browserLang = navigator.language.split('-')[0];
        return ['en', 'zh', 'ja', 'ko'].includes(browserLang) ? browserLang : 'en';
      });
      const $ = (key, params) => t(lang, key, params);
      
      return (
        <LangContext.Provider value={{ lang, setLang, $ }}>
          {children}
        </LangContext.Provider>
      );
    }

    function Root() {
      return (
        <LangProvider>
          <AppProvider>
            <App />
          </AppProvider>
        </LangProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
  </script>
</body>
</html>
